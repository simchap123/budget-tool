# Automated dependency vulnerability scanning (Dependabot). Backs the Plaid
# "performs vulnerability scanning" attestation. Dependabot opens PRs for known
# vulnerable/outdated dependencies on a weekly cadence.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
