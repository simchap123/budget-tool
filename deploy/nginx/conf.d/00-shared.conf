# Shared HTTP-context directives for all apps on this droplet.
# Installed to /etc/nginx/conf.d/00-shared.conf (auto-included by the distro nginx.conf).
#
# Keep everything here app-agnostic. Per-app server blocks live in
# /etc/nginx/sites-available/<app>.conf (symlinked into sites-enabled/).

# ---- Rate limiting zones (shared across apps) --------------------------------
limit_req_zone $binary_remote_addr zone=api:10m  rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ---- Upload size -------------------------------------------------------------
client_max_body_size 50M;

# ---- Gzip (safe defaults; harmless if the base nginx.conf already sets it) ----
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css text/xml text/javascript
           application/javascript application/x-javascript
           application/json application/xml+rss application/atom+xml
           image/svg+xml;

# ---- Backend upstreams -------------------------------------------------------
# Each app that has its own backend registers an upstream here.
# Budget Tool -> PocketBase.
upstream budget_backend {
    server 127.0.0.1:8090;
}

# Add more upstreams as you add apps, e.g.:
# upstream notes_backend { server 127.0.0.1:8091; }
