# Shared TLS + security-header snippet, included by every app server block.
# Installed to /etc/nginx/snippets/ssl.conf
#
# Uses ONE wildcard certificate (*.__DOMAIN__) for all subdomains, so adding a
# new app never requires touching certificates. See deploy/scripts/setup-wildcard-ssl.sh.

ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5;
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
