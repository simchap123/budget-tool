# Single HTTP :80 server for the whole droplet:
#   - serves ACME http-01 challenges (only needed if you ever fall back from
#     the wildcard DNS-01 flow)
#   - redirects everything else to HTTPS
# Applies to every subdomain via the default_server catch-all.
# Installed as /etc/nginx/sites-available/00-http-redirect.conf (symlink into sites-enabled).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
