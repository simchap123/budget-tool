# Budget Tool — served at https://budget.__DOMAIN__
#
# One self-contained subdomain:
#   /       -> static SPA files in /var/www/budget  (Vite build output)
#   /api    -> PocketBase backend (upstream budget_backend, 127.0.0.1:8090)
#
# The frontend calls `import.meta.env.VITE_API_URL || '/api'`, so same-origin
# /api works with no VITE_API_URL needed in production.
#
# Installed as /etc/nginx/sites-available/budget.conf (symlink into sites-enabled).

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name budget.__DOMAIN__;

    include snippets/ssl.conf;

    root /var/www/budget;
    index index.html;

    # Auth endpoints: strict rate limit
    location ~ ^/api/collections/users/auth {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://budget_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API + realtime
    location /api {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://budget_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE for PocketBase realtime
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Block the PocketBase admin panel from the public internet.
    # Reach it via an SSH tunnel: ssh -L 8090:localhost:8090 root@<droplet>
    location ~ ^/_/ {
        deny all;
    }

    # PWA assets should not be cached long-term (so updates roll out).
    location = /service-worker.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Hashed build assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every other path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
