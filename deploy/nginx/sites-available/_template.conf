# TEMPLATE for a new app on its own subdomain.
#
# Fastest path: run  deploy/scripts/add-app.sh  which renders this for you.
# Manual path: copy to <app>.conf and replace the __PLACEHOLDERS__:
#   __APP__        short app name, e.g. notes
#   __DOMAIN__     your root domain, e.g. example.com   (=> notes.example.com)
#   __BACKEND__    upstream name if the app has a backend (else delete /api block)
#
# Static-only app: delete the two /api location blocks.
# App with a backend: also add `upstream __BACKEND__ { server 127.0.0.1:PORT; }`
#                     to /etc/nginx/conf.d/00-shared.conf and pick a unique PORT.
#
# Installed as /etc/nginx/sites-available/__APP__.conf (symlink into sites-enabled).

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __APP__.__DOMAIN__;

    include snippets/ssl.conf;         # reuses the shared *.__DOMAIN__ wildcard cert

    root /var/www/__APP__;
    index index.html;

    # --- Backend proxy (delete this whole block for a static-only app) ---------
    location /api {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://__BACKEND__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Hashed build assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
